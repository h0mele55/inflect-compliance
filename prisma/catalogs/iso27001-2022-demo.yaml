# Worked example for the YAML catalog ingestion path. A 4-control
# subset of ISO/IEC 27001:2022 Annex A used to exercise
# `framework:import` end-to-end without overlapping the 93-row
# production fixture in `prisma/fixtures/iso27001_2022_annexA.json`
# (which `prisma/seed-catalog.ts` still loads via the legacy
# require()-based path).
#
# To replace the legacy fixture entirely, expand `requirements:`
# with the full Annex A control set and migrate seed-catalog.ts to
# call applyCatalogFile against the resulting file. Out of scope
# for the introductory PR.
framework:
  key: ISO27001_DEMO
  name: ISO/IEC 27001 (demo subset)
  version: "2022-demo"
  kind: ISO_STANDARD
  description: |
    Four-control demo subset for exercising the YAML catalog
    ingestion path. Distinct framework key from the production
    ISO27001 row so this file can be applied alongside the existing
    seed without colliding.

requirements:
  - code: A.5.1
    title: Policies for information security
    summary: Establish and maintain an information security policy framework.
    theme: ORGANIZATIONAL
    themeNumber: 5
    sortOrder: 1
  - code: A.5.7
    title: Threat intelligence
    summary: Collect and analyse threat intelligence relevant to the organization.
    theme: ORGANIZATIONAL
    themeNumber: 5
    sortOrder: 2
  - code: A.8.7
    title: Protection against malware
    summary: Protection against malware shall be implemented and supported by user awareness.
    theme: TECHNOLOGICAL
    themeNumber: 8
    sortOrder: 3
  - code: A.8.16
    title: Monitoring activities
    summary: Networks, systems and applications shall be monitored for anomalous behaviour.
    theme: TECHNOLOGICAL
    themeNumber: 8
    sortOrder: 4

templates:
  - code: A-DEMO.5.1
    title: Policies for information security
    category: ORGANIZATIONAL
    defaultFrequency: ANNUALLY
    requirementCodes: [A.5.1]
  - code: A-DEMO.5.7
    title: Threat intelligence programme
    category: ORGANIZATIONAL
    defaultFrequency: QUARTERLY
    requirementCodes: [A.5.7]
  - code: A-DEMO.8.7
    title: Anti-malware controls
    category: TECHNOLOGICAL
    defaultFrequency: MONTHLY
    requirementCodes: [A.8.7]
  - code: A-DEMO.8.16
    title: Monitoring and anomaly detection
    category: TECHNOLOGICAL
    defaultFrequency: MONTHLY
    requirementCodes: [A.8.16]

pack:
  key: ISO27001_DEMO_BASE
  name: ISO 27001 demo starter pack
  version: "2022-demo"
  description: Demo pack — the four controls above.
  templateCodes: [A-DEMO.5.1, A-DEMO.5.7, A-DEMO.8.7, A-DEMO.8.16]
