# =============================================================================
# Prometheus — scrape config for the inflect-compliance observability stack.
# -----------------------------------------------------------------------------
# Scrapes:
#   * otel-collector:8889  app metrics (collector's Prometheus exporter)
#   * otel-collector:8888  collector self-telemetry
#   * localhost:9090       Prometheus itself
#   * grafana:3000         Grafana internal metrics
#   * tempo:3200           Tempo internal metrics
# =============================================================================

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    monitor: inflect-observability

# Recording + alerting rules. All *.yml files in rules/ are loaded.
rule_files:
  - /etc/prometheus/rules/*.yml

# -----------------------------------------------------------------------------
# Alertmanager — not deployed in this stack. Grafana unified alerting handles
# notification routing (see grafana/provisioning/alerting/). Uncomment and
# point at an Alertmanager instance if you prefer Prometheus-native routing.
# -----------------------------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # ---- App metrics: the collector's Prometheus exporter -----------------------
  # OTel dotted instrument names arrive underscored here, e.g.
  # api.request.duration -> api_request_duration_milliseconds_{bucket,sum,count}
  - job_name: otel-collector-app-metrics
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          component: app

  # ---- Collector self-telemetry ---------------------------------------------
  - job_name: otel-collector-self
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          component: collector

  # ---- Prometheus itself -----------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: prometheus

  # ---- Grafana ---------------------------------------------------------------
  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']
        labels:
          component: grafana

  # ---- Tempo -----------------------------------------------------------------
  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: ['tempo:3200']
        labels:
          component: tempo

# -----------------------------------------------------------------------------
# Remote write — DISABLED by default. Uncomment + fill in to ship metrics to a
# long-term store (Grafana Cloud, Mimir, Thanos Receive, ...). Keep secrets in
# env / a separate file, never inline here.
# -----------------------------------------------------------------------------
# remote_write:
#   - url: ${PROM_REMOTE_WRITE_URL}
#     # basic_auth:
#     #   username: ${PROM_REMOTE_WRITE_USERNAME}
#     #   password: ${PROM_REMOTE_WRITE_PASSWORD}
#     queue_config:
#       capacity: 10000
#       max_shards: 30
#       max_samples_per_send: 2000
#     write_relabel_configs:
#       # Example: only forward the inflect app series, drop scrape noise.
#       - source_labels: [component]
#         regex: app
#         action: keep
