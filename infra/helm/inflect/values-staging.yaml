# Staging overrides for the inflect chart.
#
# Apply with:
#   helm upgrade --install inflect-staging infra/helm/inflect \
#     --namespace inflect-staging --create-namespace \
#     --values infra/helm/inflect/values-staging.yaml
#
# Per OI-2 spec: staging = 1 replica, smaller resources.

# ── App: 1 replica, smaller resources ───────────────────────────────
# Autoscaling explicitly DISABLED so .Values.replicaCount controls
# the replica count directly.
autoscaling:
  enabled: false

replicaCount: 1

resources:
  requests:
    cpu: "250m"
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# ── Worker: 1 replica, smaller resources ────────────────────────────
worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── PgBouncer: smaller pool (less concurrency in staging) ───────────
pgbouncer:
  config:
    PGBOUNCER_PORT: "5432"
    PGBOUNCER_BIND_ADDRESS: "127.0.0.1"
    PGBOUNCER_POOL_MODE: transaction
    PGBOUNCER_MAX_CLIENT_CONN: "200"
    PGBOUNCER_DEFAULT_POOL_SIZE: "10"
    PGBOUNCER_AUTH_TYPE: scram-sha-256
    PGBOUNCER_DATABASE: inflect_compliance
    POSTGRESQL_HOST: REPLACE_ME_RDS_STAGING_ENDPOINT
    POSTGRESQL_PORT: "5432"
    POSTGRESQL_USERNAME: postgres

# ── Image tag pinning (optional — empty falls back to AppVersion) ──
image:
  tag: ""

# ── Service ─────────────────────────────────────────────────────────
service:
  enabled: true
  type: ClusterIP
  port: 80

# ── Ingress: enabled, staging hostname ──────────────────────────────
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    hosts:
      - hosts:
          - staging.example.com
        secretName: staging-example-com-tls
  forceSslRedirect: true
  rateLimit:
    enabled: true
    # Lower per-IP limit in staging to match smaller capacity
    requestsPerMinute: 300
    burstMultiplier: 5
  hsts:
    enabled: true
    maxAgeSeconds: 31536000
    includeSubDomains: true
    # No `preload` in staging — preloading the staging hostname into
    # the HSTS preload list would lock real users out if staging
    # certs lapse.
    preload: false
  proxyBodySize: 100m

# ── NetworkPolicy: DISABLED in staging ──────────────────────────────
# Easier debugging when packets aren't being silently dropped at
# the policy layer. Production turns this on.
networkPolicy:
  enabled: false
