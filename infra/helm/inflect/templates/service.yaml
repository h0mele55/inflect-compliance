{{- if .Values.service.enabled -}}
# Cluster-internal Service fronting the app Deployment. Required for
# Ingress to have a backend; selectors match component=app only (so
# worker and migration pods are NOT routed to). PgBouncer's port is
# NOT exposed via the Service — it lives at 127.0.0.1:5432 inside the
# pod network only, never reachable from outside the pod.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inflect.fullname" . }}
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "inflect.selectorLabels" (dict "ctx" . "component" "app") | nindent 4 }}
{{- end }}
