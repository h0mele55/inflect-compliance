{{- if .Values.networkPolicy.enabled -}}
# Least-privilege NetworkPolicy for the app Deployment.
#
# Per OI-2 spec:
#   - Egress: managed DB (5432), managed Redis (6379), S3 (HTTPS)
#   - Deny all other egress
#
# Implementation:
#   - DB + Redis are in the VPC; egress is allowed to the VPC CIDR on
#     ports 5432 + 6379. (DNS-based NetworkPolicy isn't part of K8s
#     core; CIDR-scoped is the cleanest practical approach.)
#   - S3 + other AWS APIs (Secrets Manager, STS) are HTTPS endpoints
#     reached over the public internet (or VPC interface endpoints
#     with IPs in the VPC CIDR — also covered). HTTPS egress to
#     0.0.0.0/0 with IMDS (169.254.169.254/32) explicitly EXCEPTED so
#     pods can't talk to the EC2 metadata service. This is
#     IRSA-friendly (IRSA uses STS:AssumeRoleWithWebIdentity over
#     HTTPS, NOT IMDS); flip blockImdsEgress to false if running EKS
#     Pod Identity which DOES use IMDS internally.
#   - DNS is allowed to the in-cluster CoreDNS (kube-dns Service in
#     kube-system). Without DNS, hostname resolution breaks
#     everything else.
#   - Ingress is allowed only from the ingress controller's namespace
#     (configurable). Worker pods and PgBouncer sidecars are
#     unaffected — this NetworkPolicy targets component=app pods only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "inflect.fullname" . }}-app
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "inflect.selectorLabels" (dict "ctx" . "component" "app") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  # ── Ingress ──────────────────────────────────────────────────────
  ingress:
    {{- with .Values.networkPolicy.ingressFrom }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.containerPort }}
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

  # ── Egress ───────────────────────────────────────────────────────
  egress:
    # 1. DNS (CoreDNS) — required for hostname resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
          podSelector:
            matchLabels:
              k8s-app: {{ .Values.networkPolicy.dnsPodLabel }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 2. Managed DB (5432) + Redis (6379) inside the VPC
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.vpcCidrBlock }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.databasePort }}
        - protocol: TCP
          port: {{ .Values.networkPolicy.redisPort }}

    # 3. HTTPS — S3, Secrets Manager, STS, OAuth providers, etc.
    {{- if .Values.networkPolicy.allowHttpsEgress }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            {{- if .Values.networkPolicy.blockImdsEgress }}
            except:
              - 169.254.169.254/32
            {{- end }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}

    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
