{{- if .Values.autoscaling.enabled -}}
# HorizontalPodAutoscaler for the app Deployment.
#
# Per OI-2 spec:
#   - 2 → 10 replicas
#   - CPU target 70% (always emitted)
#   - request-latency custom metric from OTel (optional, gated on
#     .Values.autoscaling.latency.enabled — requires Prometheus
#     Adapter or KEDA publishing the metric to custom.metrics.k8s.io)
#
# autoscaling/v2 is the modern stable API. The metrics array always
# carries the CPU resource metric; the latency entry is appended
# conditionally so the manifest renders valid YAML in either state.
#
# When this HPA is active, the app Deployment OMITS spec.replicas
# (see deployment.yaml). Otherwise Helm and HPA fight over the field
# on every helm upgrade — Helm sets it from .Values.replicaCount, HPA
# overrides to the actual scaled value, next upgrade resets, …
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "inflect.fullname" . }}
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "inflect.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.autoscaling.latency.enabled }}
    # Latency metric sourced from the OTel api.request.duration
    # histogram, surfaced per-pod via the Prometheus Adapter.
    - type: Pods
      pods:
        metric:
          name: {{ .Values.autoscaling.latency.metricName }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.latency.targetAverageValue | quote }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
