{{- if .Values.ingress.enabled -}}
# Ingress for the app Service.
#
# Per OI-2 spec:
#   - TLS termination
#   - rate limiting annotations
#   - HSTS
#
# Controller-agnostic — the chart's defaults are NGINX-Ingress
# (`nginx.ingress.kubernetes.io/*` annotations) but ALB Ingress
# Controller users can override `ingress.className` and
# `ingress.annotations` wholesale. The HSTS header injection uses
# nginx-ingress's `configuration-snippet` annotation, which the
# controller must permit (off by default since 1.9 due to
# CVE-2021-25742). Operators on a snippet-restricted controller
# should disable `ingress.hsts.enabled` here and configure HSTS at
# the controller level instead.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "inflect.fullname" . }}
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 4 }}
  annotations:
    {{- /* Rate limit per-IP. nginx-ingress: limit-rpm = requests per minute. */}}
    {{- if .Values.ingress.rateLimit.enabled }}
    nginx.ingress.kubernetes.io/limit-rpm: {{ .Values.ingress.rateLimit.requestsPerMinute | quote }}
    nginx.ingress.kubernetes.io/limit-burst-multiplier: {{ .Values.ingress.rateLimit.burstMultiplier | quote }}
    {{- end }}
    {{- /* TLS redirect — force HTTP→HTTPS at the ingress layer. */}}
    {{- if .Values.ingress.forceSslRedirect }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}
    {{- /* HSTS via response header injection. */}}
    {{- if .Values.ingress.hsts.enabled }}
    {{- /* `| int` forces integer formatting; Helm's YAML→interface{}
           round-trip otherwise renders large integers in scientific
           notation (e.g. 31536000 → 3.1536e+07), which most browsers
           will reject as an invalid HSTS max-age. */}}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age={{ .Values.ingress.hsts.maxAgeSeconds | int }}{{ if .Values.ingress.hsts.includeSubDomains }}; includeSubDomains{{ end }}{{ if .Values.ingress.hsts.preload }}; preload{{ end }}";
    {{- end }}
    {{- /* Body size limit — Next.js + multipart uploads. */}}
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.proxyBodySize | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- range .Values.ingress.tls.hosts }}
    - hosts:
        {{- toYaml .hosts | nindent 8 }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "inflect.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
