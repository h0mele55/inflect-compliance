{{- if .Values.migration.enabled -}}
# Prisma migration Job — Helm pre-install / pre-upgrade hook.
#
# Lifecycle ordering:
#   1. helm install / helm upgrade triggers this hook FIRST
#   2. Helm waits for the Job to complete (Job.status.succeeded == 1)
#   3. App + worker Deployments roll out only after success
#   4. On failure: Helm aborts the install/upgrade — app pods are NOT
#      rolled to the new image. The previous revision keeps serving.
#
# Why backoffLimit=0:
#   A failed migration is an intentional stop. Half-applied migrations
#   are usually NOT safely retryable (Prisma Migrate's failure modes:
#   schema-already-modified, lock-not-released, etc.). Surfacing the
#   failure to the operator is the correct behaviour; auto-retry would
#   mask the real issue.
#
# Why hook-delete-policy = before-hook-creation,hook-succeeded:
#   - before-hook-creation: deletes the prior Job before recreating
#     (lets a re-run upgrade work deterministically — no "Job already
#     exists" errors when revisiting the same release).
#   - hook-succeeded: removes the Job after success so the namespace
#     stays tidy.
#   - Failed Jobs are NOT deleted — operators need their logs.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "inflect.fullname" . }}-migrate
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "migration") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.migration.hookWeight | quote }}
    "helm.sh/hook-delete-policy": {{ .Values.migration.hookDeletePolicy }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      {{- with .Values.migration.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "inflect.labels" (dict "ctx" . "component" "migration") | nindent 8 }}
        {{- with .Values.migration.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "inflect.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount | default false }}
      {{- with .Values.migration.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "inflect.migrationImage" . }}
          imagePullPolicy: {{ default .Values.image.pullPolicy .Values.migration.image.pullPolicy }}
          {{- with .Values.migration.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            {{- toYaml .Values.migration.command | nindent 12 }}
          envFrom:
            {{- if .Values.envFrom.configMap.enabled }}
            - configMapRef:
                name: {{ include "inflect.envFromConfigMapName" . }}
            {{- end }}
            {{- if .Values.envFrom.secret.enabled }}
            - secretRef:
                name: {{ include "inflect.envFromSecretName" . }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
      {{- with .Values.migration.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.migration.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.migration.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
