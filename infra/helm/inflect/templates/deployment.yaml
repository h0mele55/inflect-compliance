apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inflect.fullname" . }}
  labels:
    {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "inflect.selectorLabels" (dict "ctx" . "component" "app") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "inflect.labels" (dict "ctx" . "component" "app") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "inflect.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount | default false }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "inflect.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            {{- if .Values.envFrom.configMap.enabled }}
            - configMapRef:
                name: {{ include "inflect.envFromConfigMapName" . }}
            {{- end }}
            {{- if .Values.envFrom.secret.enabled }}
            - secretRef:
                name: {{ include "inflect.envFromSecretName" . }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.pgbouncer.enabled }}
        # PgBouncer sidecar — provides connection pooling on
        # localhost:5432. The app's DATABASE_URL must point here;
        # DIRECT_DATABASE_URL keeps direct upstream so migrations
        # bypass the pool.
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          {{- with .Values.pgbouncer.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.pgbouncer.config }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "inflect.pgbouncerSecretName" . }}
                  key: {{ .Values.pgbouncer.passwordSecret.key }}
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          {{- if .Values.pgbouncer.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.pgbouncer.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.pgbouncer.readinessProbe.enabled }}
          readinessProbe:
            {{- omit .Values.pgbouncer.readinessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
