# Alertmanager receivers + routing for inflect-compliance.
#
# Severity routing (Epic OI-3 source-of-truth):
#   - severity=critical → PagerDuty (pages on-call)
#   - severity=warning  → Slack     (investigated next business day)
#
# Inhibit rules collapse warning + critical of the same alertname so a
# single underlying incident doesn't double-page.
#
# Required Alertmanager environment variables (set via the cluster's
# alertmanager Secret — never commit them):
#   PAGERDUTY_SERVICE_KEY  — Events API v2 integration key
#   SLACK_WEBHOOK_URL      — incoming webhook for #alerts-warnings
#
# Validation:
#   amtool check-config infra/alerts/receivers.yml

global:
  resolve_timeout: 5m
  pagerduty_url: https://events.pagerduty.com/v2/enqueue
  # SMTP / email-relay block intentionally omitted — alerts route only
  # to PagerDuty (critical) and Slack (warning). Adding email later
  # requires extending receivers + routes; not part of the OI-3
  # source-of-truth.

# ─── Templates (referenced by receivers below) ──────────────────────
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ─── Top-level route ────────────────────────────────────────────────
# Default receiver handles anything that doesn't match a specific
# child route. We point the default at Slack-warnings so a misrouted
# critical alert never goes silently — it lands SOMEWHERE visible.
route:
  receiver: slack-warnings
  group_by: [alertname, service, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical → PagerDuty. Tighter group_wait + repeat_interval
    # because page-able events should reach the on-call fast and not
    # be silenced by overnight inhibit windows.
    - matchers:
        - severity = "critical"
      receiver: pagerduty-critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: false

    # Warnings → Slack. Already the default receiver, but explicit
    # match makes intent obvious and lets ops add more warning-tier
    # channels later without restructuring.
    - matchers:
        - severity = "warning"
      receiver: slack-warnings
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false

# ─── Receivers ──────────────────────────────────────────────────────
receivers:
  # PagerDuty — critical-tier on-call routing.
  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"
        severity: critical
        # PagerDuty's `dedup_key` makes resolve-on-clear work cleanly:
        # firing + resolved share the same key, so the incident
        # auto-closes when the alert stops firing.
        details:
          firing: "{{ .Alerts.Firing | len }}"
          resolved: "{{ .Alerts.Resolved | len }}"
          alertname: "{{ .CommonLabels.alertname }}"
          service: "{{ .CommonLabels.service }}"
          slo: "{{ .CommonLabels.slo }}"
          runbook: "{{ (index .Alerts 0).Annotations.description }}"
          dashboard: "{{ (index .Alerts 0).Annotations.dashboard }}"
          link: "{{ (index .Alerts 0).GeneratorURL }}"
        # Send resolved notifications so the incident closes when the
        # underlying condition recovers.
        send_resolved: true

  # Slack — warning-tier non-paging routing.
  - name: slack-warnings
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#alerts-warnings"
        send_resolved: true
        title: |-
          {{- if eq .Status "firing" }}⚠️{{ else }}✅{{ end }} {{ .GroupLabels.alertname }} ({{ .Status }})
        title_link: "{{ (index .Alerts 0).GeneratorURL }}"
        text: |-
          {{- range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{- if .Annotations.dashboard }}
          📊 Dashboard: {{ .Annotations.dashboard }}
          {{- end }}
          {{- end }}
        # Distinct color cue for resolved notifications so operators
        # don't mistake a recovery message for a new firing alert.
        color: |-
          {{- if eq .Status "firing" }}warning{{ else }}good{{ end }}

# ─── Inhibit rules ──────────────────────────────────────────────────
# When critical fires for a (alertname,service) tuple, suppress the
# matching warning so on-call doesn't see two notifications for the
# same underlying condition.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: [alertname, service]

  # ApiP95LatencyCritical implies ApiP95LatencyWarning; same shape
  # for error-rate and queue-depth + their critical siblings. The
  # generic rule above already covers these via the same alertname
  # prefix when appropriate, but the explicit listing below makes
  # the intent obvious to a reviewer.
  - source_matchers:
      - alertname = "QueueDepthBacklogCritical"
    target_matchers:
      - alertname = "QueueDepthBacklogWarning"
    equal: [service]

  - source_matchers:
      - alertname = "RedisMemoryHighCritical"
    target_matchers:
      - alertname = "RedisMemoryHighWarning"
    equal: [service]

  - source_matchers:
      - alertname = "CertificateExpiryCritical"
    target_matchers:
      - alertname = "CertificateExpiryWarning"
    equal: [service]
