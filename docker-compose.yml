services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inflect_compliance
    # Postgres is only directly accessible on port 5434 (for migrations).
    # Application traffic goes through PgBouncer on port 5433.
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inflect_compliance"]
      interval: 3s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── Connection to upstream Postgres ──
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inflect_compliance
      # ── Pool configuration ──
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "25"
      MAX_CLIENT_CONN: "200"
      MAX_DB_CONNECTIONS: "50"
      # ── Auth ──
      AUTH_TYPE: scram-sha-256
      # ── Monitoring ──
      STATS_PERIOD: "60"
      ADMIN_USERS: postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Redis (caching, jobs, async coordination) ──
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── ClamAV (antivirus scanning) ──
  clamav:
    image: clamav/clamav:1.4
    ports:
      - '3310:3310'
    volumes:
      - clamav-defs:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # ClamAV needs ~2 min to download defs on first boot

volumes:
  pgdata:
  redisdata:
  clamav-defs:
