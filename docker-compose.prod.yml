# ─── Production Environment ─────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Requires: .env.production (copy from .env.production.example)
# ────────────────────────────────────────────────────────────
services:
  # ── Postgres ──
  db:
    image: postgres:16-alpine
    container_name: inflect-prod-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inflect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-inflect_production}
    volumes:
      - prod-pgdata:/var/lib/postgresql/data
    tmpfs:
      - /tmp:size=256M        # Temp files never hit persistent disk
      - /run/postgresql:size=16M
    shm_size: '256m'           # Shared memory for Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inflect} -d ${POSTGRES_DB:-inflect_production}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Security: no ports exposed — only accessible from app via internal network
    # Encryption at rest: use LUKS/dm-crypt on the host volume (see docs/encryption-data-protection.md)
    networks:
      - internal

  # ── Next.js App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inflect-prod-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-inflect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inflect_production}?schema=public
      FILE_STORAGE_ROOT: /data/uploads
      UPLOAD_DIR: /data/uploads
    volumes:
      - prod-uploads:/data/uploads
    # Security: run read-only filesystem where possible
    read_only: true
    tmpfs:
      - /tmp:size=128M
      - /app/.next/cache:size=512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  prod-pgdata:
    name: inflect-prod-pgdata
  prod-uploads:
    name: inflect-prod-uploads
