# Cross-Framework Mapping Set: NIST CSF 2.0 → SOC 2 (2017)
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# Maps NIST CSF 2.0 subcategories to SOC 2 Trust Services Criteria.
# This mapping set enables transitive resolution chains:
# ISO 27001 → NIST CSF → SOC 2 for multi-framework compliance analysis.
#
# NIST CSF is function-oriented (Govern, Identify, Protect, Detect, Respond,
# Recover); SOC 2 is criteria-based. Mappings reflect structural overlap
# rather than full compliance equivalence.

urn: urn:inflect:mappingset:nist-csf-to-soc2
name: "NIST CSF 2.0 → SOC 2 (2017)"
description: >
  Cross-framework traceability mapping between NIST Cybersecurity Framework 2.0
  subcategories and AICPA SOC 2 Trust Services Criteria. Enables transitive
  traceability for organizations managing both NIST and SOC 2 compliance
  obligations. Mappings are structural guidance, not compliance guarantees.
version: 1
source_framework_ref: NIST-CSF-2.0
target_framework_ref: SOC2-2017

mapping_entries:
  # ─── GOVERN Function ─────────────────────────────────────────────

  # GV.OC-01: Organizational Context
  - source_ref: GV.OC-01
    target_ref: CC1.1
    strength: RELATED
    rationale: Understanding organizational context supports establishing the control environment.

  - source_ref: GV.OC-01
    target_ref: CC2.1
    strength: RELATED
    rationale: Organizational context informs information and communication strategies.

  # GV.OC-02: Legal/Regulatory Obligations
  - source_ref: GV.OC-02
    target_ref: CC1.1
    strength: RELATED
    rationale: Legal obligation awareness supports the ethical and compliance foundation of the control environment.

  # GV.RM-01: Risk Management Strategy
  - source_ref: GV.RM-01
    target_ref: CC3.1
    strength: INTERSECT
    rationale: Risk management strategy directly overlaps with SOC 2 risk assessment processes.

  - source_ref: GV.RM-01
    target_ref: CC5.1
    strength: RELATED
    rationale: Risk strategy informs control activity design and implementation.

  # ─── IDENTIFY Function ───────────────────────────────────────────

  # ID.AM-01: Asset Inventory
  - source_ref: ID.AM-01
    target_ref: CC6.1
    strength: RELATED
    rationale: Hardware asset inventory supports logical and physical access control decisions.

  # ID.AM-02: Software Inventory
  - source_ref: ID.AM-02
    target_ref: CC6.1
    strength: RELATED
    rationale: Software platform inventory informs access control scope for systems.

  # ID.RA-01: Risk Assessment
  - source_ref: ID.RA-01
    target_ref: CC3.1
    strength: INTERSECT
    rationale: Risk assessment activities directly overlap; NIST scope is broader than SOC 2 risk focus.

  # ─── PROTECT Function ────────────────────────────────────────────

  # PR.AA-01: Identity Management and Authentication
  - source_ref: PR.AA-01
    target_ref: CC6.1
    strength: INTERSECT
    rationale: Identity and access management directly overlaps with SOC 2 logical access controls.

  # PR.DS-01: Data Security
  - source_ref: PR.DS-01
    target_ref: CC6.1
    strength: RELATED
    rationale: Data security measures support logical access control for data protection.

  - source_ref: PR.DS-01
    target_ref: C1
    strength: RELATED
    rationale: Data security protections are related to SOC 2 confidentiality criteria.

  # ─── DETECT Function ─────────────────────────────────────────────

  # DE.CM-01: Continuous Monitoring
  - source_ref: DE.CM-01
    target_ref: CC7.1
    strength: INTERSECT
    rationale: Both address monitoring activities; NIST focuses on network/system monitoring while SOC 2 covers broader system operations.

  # ─── RESPOND Function ────────────────────────────────────────────

  # RS.MA-01: Incident Management
  - source_ref: RS.MA-01
    target_ref: CC7.1
    strength: RELATED
    rationale: Incident management is triggered by system monitoring; SOC 2 CC7 covers both monitoring and response.

  - source_ref: RS.MA-01
    target_ref: CC2.1
    strength: RELATED
    rationale: Incident communication is part of SOC 2 information and communication criteria.

  # ─── RECOVER Function ────────────────────────────────────────────

  # RC.RP-01: Recovery Planning
  - source_ref: RC.RP-01
    target_ref: A1
    strength: INTERSECT
    rationale: Recovery planning directly supports SOC 2 availability criteria for system resilience.
