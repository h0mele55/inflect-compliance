# Cross-Framework Mapping Set: NIS2 Directive (2022) → ISO 27001:2022
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# Maps NIS2 Article 21 security measures to ISO 27001 Annex A controls.
# NIS2 requirements are high-level EU directive obligations; ISO 27001
# provides the detailed control framework commonly used to demonstrate
# NIS2 compliance. Recital 79 of NIS2 explicitly references ISO 27001
# as a relevant standard.
#
# NIS2 requirements are typically broader than individual ISO controls,
# so many mappings use INTERSECT or SUPERSET to reflect that a single
# NIS2 obligation spans multiple Annex A controls.

urn: urn:inflect:mappingset:nis2-to-iso27001
name: "NIS2 (2022) → ISO 27001:2022"
description: >
  Cross-framework traceability mapping between EU NIS2 Directive Article 21
  security measures and ISO/IEC 27001:2022 Annex A controls. NIS2 explicitly
  references ISO 27001 as a relevant implementation standard (Recital 79).
  NIS2 obligations are broad; ISO 27001 provides granular controls.
  Mappings are structural guidance, not compliance guarantees.
version: 1
source_framework_ref: NIS2-2022
target_framework_ref: ISO27001-2022

mapping_entries:
  # ─── NIS2-RM: Risk Management ────────────────────────────────────
  - source_ref: NIS2-RM
    target_ref: A.5.1
    strength: RELATED
    rationale: NIS2 risk management measures require policy foundations addressed by A.5.1.

  - source_ref: NIS2-RM
    target_ref: A.5.7
    strength: INTERSECT
    rationale: NIS2 risk measures include threat awareness activities aligned with threat intelligence.

  # ─── NIS2-IR: Incident Response ──────────────────────────────────
  - source_ref: NIS2-IR
    target_ref: A.5.24
    strength: SUPERSET
    rationale: NIS2 incident handling encompasses planning, detection, response, and notification — broader than A.5.24 planning alone.

  - source_ref: NIS2-IR
    target_ref: A.5.26
    strength: INTERSECT
    rationale: Both address incident response processes; NIS2 includes mandatory notification requirements.

  # ─── NIS2-BC: Business Continuity ────────────────────────────────
  - source_ref: NIS2-BC
    target_ref: A.5.29
    strength: INTERSECT
    rationale: Both address business continuity; NIS2 emphasizes crisis management and critical services.

  - source_ref: NIS2-BC
    target_ref: A.5.30
    strength: INTERSECT
    rationale: ICT readiness is a facet of NIS2 continuity requirements for essential services.

  # ─── NIS2-SC: Supply Chain Security ──────────────────────────────
  - source_ref: NIS2-SC
    target_ref: A.5.19
    strength: INTERSECT
    rationale: Both address supply chain security obligations; NIS2 extends to sector-wide dependencies.

  - source_ref: NIS2-SC
    target_ref: A.5.23
    strength: RELATED
    rationale: Supply chain security extends to cloud service providers as critical suppliers.

  # ─── NIS2-SD: Secure Development ─────────────────────────────────
  - source_ref: NIS2-SD
    target_ref: A.8.25
    strength: INTERSECT
    rationale: Both address secure development practices for network and information systems.

  - source_ref: NIS2-SD
    target_ref: A.8.32
    strength: RELATED
    rationale: Secure development includes change management discipline for system modifications.

  # ─── NIS2-AS: Asset Security ─────────────────────────────────────
  - source_ref: NIS2-AS
    target_ref: A.5.9
    strength: INTERSECT
    rationale: Asset security encompasses inventory and classification requirements.

  - source_ref: NIS2-AS
    target_ref: A.5.12
    strength: INTERSECT
    rationale: Asset security includes information classification and labeling measures.

  # ─── NIS2-CH: Cryptography and Hashing ───────────────────────────
  - source_ref: NIS2-CH
    target_ref: A.8.24
    strength: INTERSECT
    rationale: Both address cryptographic controls for data protection — similar technical scope.

  # ─── NIS2-CR: Cyber Resilience ───────────────────────────────────
  - source_ref: NIS2-CR
    target_ref: A.8.7
    strength: RELATED
    rationale: Cyber resilience strategy includes malware defense as one protection layer.

  - source_ref: NIS2-CR
    target_ref: A.8.8
    strength: INTERSECT
    rationale: Vulnerability management is a core component of cyber resilience measures.

  # ─── NIS2-HR: Human Resource Security ────────────────────────────
  - source_ref: NIS2-HR
    target_ref: A.6.3
    strength: INTERSECT
    rationale: HR security requirements include cyber hygiene and awareness training obligations.

  # ─── NIS2-AM: Access Management ──────────────────────────────────
  - source_ref: NIS2-AM
    target_ref: A.5.15
    strength: INTERSECT
    rationale: Both address access management policies and procedures for information systems.

  - source_ref: NIS2-AM
    target_ref: A.5.17
    strength: SUBSET
    rationale: Authentication information management is one aspect of NIS2 MFA and access requirements.

  - source_ref: NIS2-AM
    target_ref: A.8.2
    strength: SUBSET
    rationale: Privileged access rights management is one component of NIS2 access management obligations.

  # ─── NIS2-RE: Reporting ──────────────────────────────────────────
  - source_ref: NIS2-RE
    target_ref: A.5.26
    strength: RELATED
    rationale: NIS2 mandatory incident reporting overlaps with incident response communication procedures.

  # ─── NIS2-GOV: Governance ────────────────────────────────────────
  - source_ref: NIS2-GOV
    target_ref: A.5.1
    strength: RELATED
    rationale: NIS2 management body accountability requires supporting information security policies.

  - source_ref: NIS2-GOV
    target_ref: A.5.2
    strength: INTERSECT
    rationale: NIS2 governance directly requires defined security roles and management body oversight.
