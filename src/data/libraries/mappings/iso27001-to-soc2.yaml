# Cross-Framework Mapping Set: ISO 27001:2022 → SOC 2 (2017)
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# Covers Annex A controls → SOC 2 Trust Services Criteria (Common Criteria
# and supplemental criteria). Strength assignments are conservative,
# reflecting the structural relationship between ISO control objectives
# and SOC 2 points-of-focus rather than claiming automatic compliance.

urn: urn:inflect:mappingset:iso27001-to-soc2
name: "ISO 27001:2022 → SOC 2 (2017)"
description: >
  Cross-framework traceability mapping between ISO/IEC 27001:2022 Annex A
  controls and AICPA SOC 2 Trust Services Criteria. ISO 27001 controls are
  prescriptive; SOC 2 criteria are principle-based. Overlap exists but scope
  differs — mappings are structural guidance, not compliance guarantees.
version: 1
source_framework_ref: ISO27001-2022
target_framework_ref: SOC2-2017

mapping_entries:
  # ─── A.5.1 Information Security Policies ─────────────────────────
  - source_ref: A.5.1
    target_ref: CC1.1
    strength: RELATED
    rationale: Policy governance addresses organizational commitment related to the control environment.

  - source_ref: A.5.1
    target_ref: CC5.1
    strength: RELATED
    rationale: Security policies underpin the design and implementation of control activities.

  # ─── A.5.2 Information Security Roles ────────────────────────────
  - source_ref: A.5.2
    target_ref: CC1.2
    strength: RELATED
    rationale: Defined security roles support board and management oversight structures.

  # ─── A.5.3 Segregation of Duties ─────────────────────────────────
  - source_ref: A.5.3
    target_ref: CC5.1
    strength: INTERSECT
    rationale: Segregation of duties is a specific control activity; SOC 2 CC5.1 covers broader control activity design.

  # ─── A.5.9 Inventory of Information Assets ───────────────────────
  - source_ref: A.5.9
    target_ref: CC6.1
    strength: RELATED
    rationale: Asset classification informs access control decisions but does not directly address logical access.

  # ─── A.5.12 Classification of Information ────────────────────────
  - source_ref: A.5.12
    target_ref: CC6.1
    strength: RELATED
    rationale: Data classification drives access control requirements for sensitive information.

  # ─── A.5.14 Information Transfer ─────────────────────────────────
  - source_ref: A.5.14
    target_ref: CC6.1
    strength: INTERSECT
    rationale: Transfer policies overlap with SOC 2 logical access controls for data in transit.

  # ─── A.5.15 Access Control ───────────────────────────────────────
  - source_ref: A.5.15
    target_ref: CC6.1
    strength: INTERSECT
    rationale: Both address access management — ISO defines policy, SOC 2 defines criteria.

  # ─── A.5.17 Authentication Information ───────────────────────────
  - source_ref: A.5.17
    target_ref: CC6.1
    strength: SUBSET
    rationale: Authentication is one aspect of SOC 2 broader logical and physical access controls.

  # ─── A.5.19 Supplier Information Security ────────────────────────
  - source_ref: A.5.19
    target_ref: CC9.1
    strength: INTERSECT
    rationale: Both address vendor/supplier security; ISO focuses on contractual controls while SOC 2 focuses on risk management.

  # ─── A.5.23 Cloud Services Security ──────────────────────────────
  - source_ref: A.5.23
    target_ref: CC9.1
    strength: RELATED
    rationale: Cloud provider security is a specific subset of vendor management scope.

  # ─── A.5.24 Incident Management Planning ─────────────────────────
  - source_ref: A.5.24
    target_ref: CC7.1
    strength: RELATED
    rationale: Incident planning prepares for the monitoring and detection lifecycle.

  # ─── A.5.26 Response to Incidents ────────────────────────────────
  - source_ref: A.5.26
    target_ref: CC7.1
    strength: INTERSECT
    rationale: Incident response directly overlaps with SOC 2 system monitoring and detection.

  # ─── A.5.29 Disruption Preparedness ──────────────────────────────
  - source_ref: A.5.29
    target_ref: A1
    strength: INTERSECT
    rationale: Business continuity preparedness directly maps to SOC 2 availability criteria.

  # ─── A.5.30 ICT Readiness for Business Continuity ────────────────
  - source_ref: A.5.30
    target_ref: A1
    strength: SUBSET
    rationale: ICT readiness is a subset of overall availability — addresses technology recovery only.

  # ─── A.5.34 Privacy and PII Protection ───────────────────────────
  - source_ref: A.5.34
    target_ref: P1
    strength: INTERSECT
    rationale: PII protection obligations overlap with SOC 2 privacy criteria but are scoped differently.

  # ─── A.8.1 User Endpoint Devices ─────────────────────────────────
  - source_ref: A.8.1
    target_ref: CC6.1
    strength: RELATED
    rationale: Endpoint device controls support logical access management objectives.

  # ─── A.8.2 Privileged Access Rights ──────────────────────────────
  - source_ref: A.8.2
    target_ref: CC6.1
    strength: SUBSET
    rationale: Privileged access management is a specific aspect of SOC 2 logical access controls.

  # ─── A.8.5 Secure Authentication ─────────────────────────────────
  - source_ref: A.8.5
    target_ref: CC6.1
    strength: SUBSET
    rationale: Secure authentication mechanisms are one component of broader access controls.

  # ─── A.8.7 Protection Against Malware ────────────────────────────
  - source_ref: A.8.7
    target_ref: CC7.1
    strength: RELATED
    rationale: Anti-malware supports system monitoring and detection activities.

  # ─── A.8.8 Technical Vulnerability Management ────────────────────
  - source_ref: A.8.8
    target_ref: CC7.1
    strength: RELATED
    rationale: Vulnerability management is a proactive component of system monitoring.

  # ─── A.8.13 Information Backup ───────────────────────────────────
  - source_ref: A.8.13
    target_ref: A1
    strength: RELATED
    rationale: Backup supports availability but does not fully address SOC 2 availability criteria.

  # ─── A.8.15 Logging ──────────────────────────────────────────────
  - source_ref: A.8.15
    target_ref: CC7.1
    strength: INTERSECT
    rationale: Logging is a core technical mechanism for system monitoring and anomaly detection.

  # ─── A.8.24 Use of Cryptography ──────────────────────────────────
  - source_ref: A.8.24
    target_ref: CC6.1
    strength: RELATED
    rationale: Cryptographic controls support logical access protections for data at rest and in transit.

  # ─── A.8.25 Secure Development Life Cycle ────────────────────────
  - source_ref: A.8.25
    target_ref: CC8.1
    strength: INTERSECT
    rationale: Secure development practices overlap with SOC 2 change management scope.

  # ─── A.8.32 Change Management ────────────────────────────────────
  - source_ref: A.8.32
    target_ref: CC8.1
    strength: INTERSECT
    rationale: Both address change control processes for information systems.
