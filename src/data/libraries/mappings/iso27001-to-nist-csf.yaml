# Cross-Framework Mapping Set: ISO 27001:2022 → NIST CSF 2.0
# Data-driven mapping file for the RequirementMapping ingestion pipeline.
#
# This file is standalone — it does NOT live inside a framework library's
# objects.mappings block. Instead it uses the dedicated mapping-set schema
# and is ingested by the mapping-set importer.

urn: urn:inflect:mappingset:iso27001-to-nist-csf
name: "ISO 27001:2022 → NIST CSF 2.0"
description: >
  Cross-framework traceability mapping between ISO/IEC 27001:2022 Annex A
  controls and NIST Cybersecurity Framework 2.0 functions/categories.
  Mappings are structural guidance — not guarantees of compliance.
version: 1
source_framework_ref: ISO27001-2022
target_framework_ref: NIST-CSF-2.0

mapping_entries:
  # ─── A.5.1 Information Security Policies ─────────────────────────
  - source_ref: A.5.1
    target_ref: GV.OC-01
    strength: RELATED
    rationale: Security policies address organizational context governance.

  - source_ref: A.5.1
    target_ref: GV.RM-01
    strength: RELATED
    rationale: Security policies establish risk management foundations.

  # ─── A.5.2 Information Security Roles ────────────────────────────
  - source_ref: A.5.2
    target_ref: GV.RR-01
    strength: INTERSECT
    rationale: Role assignments directly overlap with NIST roles & responsibilities.

  # ─── A.5.3 Segregation of Duties ─────────────────────────────────
  - source_ref: A.5.3
    target_ref: PR.AA-01
    strength: RELATED
    rationale: Segregation of duties supports identity and access management.

  # ─── A.5.7 Threat Intelligence ───────────────────────────────────
  - source_ref: A.5.7
    target_ref: ID.RA-01
    strength: RELATED
    rationale: Threat intelligence feeds into risk assessment activities.

  # ─── A.5.9 Inventory of Information Assets ───────────────────────
  - source_ref: A.5.9
    target_ref: ID.AM-01
    strength: INTERSECT
    rationale: Asset inventory overlaps with NIST asset management.

  # ─── A.5.15 Access Control ───────────────────────────────────────
  - source_ref: A.5.15
    target_ref: PR.AA-01
    strength: INTERSECT
    rationale: Access control is a primary identity and access management requirement.

  # ─── A.5.24 Incident Management Planning ─────────────────────────
  - source_ref: A.5.24
    target_ref: RS.MA-01
    strength: RELATED
    rationale: Incident planning maps to NIST incident management.

  # ─── A.5.26 Response to Incidents ────────────────────────────────
  - source_ref: A.5.26
    target_ref: RS.MA-01
    strength: INTERSECT
    rationale: Incident response directly overlaps with NIST incident management.

  # ─── A.5.29 Disruption Preparedness ──────────────────────────────
  - source_ref: A.5.29
    target_ref: RC.RP-01
    strength: RELATED
    rationale: Disruption preparedness supports NIST recovery planning.

  # ─── A.8.8 Technical Vulnerability Management ────────────────────
  - source_ref: A.8.8
    target_ref: ID.RA-01
    strength: RELATED
    rationale: Vulnerability management supports risk assessment activities.

  # ─── A.8.15 Logging ──────────────────────────────────────────────
  - source_ref: A.8.15
    target_ref: DE.CM-01
    strength: RELATED
    rationale: Logging supports continuous monitoring activities.

  # ─── A.8.25 Secure Development Life Cycle ────────────────────────
  - source_ref: A.8.25
    target_ref: PR.DS-01
    strength: RELATED
    rationale: Secure SDLC supports data security measures.

  # ─── A.8.32 Change Management ────────────────────────────────────
  - source_ref: A.8.32
    target_ref: PR.DS-01
    strength: RELATED
    rationale: Change management supports data security configuration.
