# SOC 2 Trust Services Criteria (2017 with 2022 Revision) — Framework Library
# Based on the AICPA Trust Services Criteria framework structure.
# Descriptions paraphrased — NOT verbatim AICPA text.

urn: urn:inflect:library:soc2-2017
locale: en
ref_id: SOC2-2017
name: SOC 2 Trust Services Criteria
description: >
  The SOC 2 Trust Services Criteria (TSC) framework defines control criteria
  for evaluating and reporting on controls over security, availability,
  processing integrity, confidentiality, and privacy.
copyright: >
  Based on the publicly available AICPA Trust Services Criteria structure.
  Full criteria available from AICPA.
version: 1
publication_date: "2022-01-01"
provider: AICPA
packager: inflect
kind: SOC_CRITERIA

objects:
  framework:
    urn: urn:inflect:framework:soc2-2017
    ref_id: SOC2-2017
    name: SOC 2 Trust Services Criteria
    description: >
      Trust Services Criteria for Security, Availability, Processing Integrity,
      Confidentiality, and Privacy.

    requirement_nodes:
      # ─── CC1 — Control Environment ──────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc1
        ref_id: CC1
        name: Control Environment
        description: >
          The organization demonstrates commitment to integrity and ethical
          values, exercises oversight, and attracts competent individuals.
          (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc1.1
        ref_id: CC1.1
        name: Integrity and Ethical Values
        description: >
          The entity demonstrates a commitment to integrity and ethical values.
          (Paraphrase — COSO Principle 1)
        parent_urn: urn:inflect:req:soc2-2017:cc1
        depth: 2
        assessable: true
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc1.2
        ref_id: CC1.2
        name: Board Independence
        description: >
          The board of directors demonstrates independence from management
          and exercises oversight of internal control. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc1
        depth: 2
        assessable: true
        category: Security

      # ─── CC2 — Communication & Information ──────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc2
        ref_id: CC2
        name: Communication & Information
        description: >
          The organization generates and uses quality information, communicates
          internally and externally about control functioning. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc2.1
        ref_id: CC2.1
        name: Quality Information
        description: >
          The entity obtains or generates relevant, quality information to
          support the functioning of internal control. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc2
        depth: 2
        assessable: true
        category: Security

      # ─── CC3 — Risk Assessment ──────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc3
        ref_id: CC3
        name: Risk Assessment
        description: >
          The organization identifies and assesses risks to achieving its
          objectives, including fraud risk. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc3.1
        ref_id: CC3.1
        name: Risk Identification
        description: >
          The entity specifies objectives with sufficient clarity to enable
          the identification and assessment of risks. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc3
        depth: 2
        assessable: true
        category: Security

      # ─── CC5 — Control Activities ───────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc5
        ref_id: CC5
        name: Control Activities
        description: >
          The organization selects and develops control activities that
          mitigate risks. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc5.1
        ref_id: CC5.1
        name: Control Selection
        description: >
          The entity selects and develops control activities that contribute
          to the mitigation of risks to the achievement of objectives.
          (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc5
        depth: 2
        assessable: true
        category: Security

      # ─── CC6 — Logical & Physical Access ────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc6
        ref_id: CC6
        name: Logical & Physical Access Controls
        description: >
          The organization restricts logical and physical access to systems
          and data, manages credentials, and protects against unauthorized
          access. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc6.1
        ref_id: CC6.1
        name: Access Security
        description: >
          The entity implements logical access security software, infrastructure,
          and architectures over protected assets. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc6
        depth: 2
        assessable: true
        category: Security

      # ─── CC7 — System Operations ────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc7
        ref_id: CC7
        name: System Operations
        description: >
          The organization detects and monitors for anomalies and events that
          represent potential compromises, and responds to incidents. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc7.1
        ref_id: CC7.1
        name: Anomaly Detection
        description: >
          To meet its objectives, the entity uses detection and monitoring
          procedures to identify changes to configurations that result in
          new vulnerabilities. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc7
        depth: 2
        assessable: true
        category: Security

      # ─── CC8 — Change Management ────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc8
        ref_id: CC8
        name: Change Management
        description: >
          The organization manages authorization, design, development,
          configuration, testing, and approval of changes. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc8.1
        ref_id: CC8.1
        name: Change Authorization
        description: >
          The entity authorizes, designs, develops or acquires, configures,
          documents, tests, approves, and implements changes. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc8
        depth: 2
        assessable: true
        category: Security

      # ─── CC9 — Risk Mitigation ──────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:cc9
        ref_id: CC9
        name: Risk Mitigation
        description: >
          The organization identifies, selects, and develops risk mitigation
          activities for risks from business processes and vendors. (Paraphrase)
        depth: 1
        assessable: false
        category: Security

      - urn: urn:inflect:req:soc2-2017:cc9.1
        ref_id: CC9.1
        name: Vendor Risk
        description: >
          The entity identifies, selects, and develops risk mitigation
          activities for risks arising from the use of vendors. (Paraphrase)
        parent_urn: urn:inflect:req:soc2-2017:cc9
        depth: 2
        assessable: true
        category: Security

      # ─── A1 — Availability ──────────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:a1
        ref_id: A1
        name: Availability
        description: >
          The organization maintains infrastructure, software, and procedures
          to support system availability as committed. (Paraphrase)
        depth: 1
        assessable: true
        category: Availability

      # ─── C1 — Confidentiality ───────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:c1
        ref_id: C1
        name: Confidentiality
        description: >
          The organization identifies and protects confidential information
          during processing, storage, and disposal. (Paraphrase)
        depth: 1
        assessable: true
        category: Confidentiality

      # ─── PI1 — Processing Integrity ─────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:pi1
        ref_id: PI1
        name: Processing Integrity
        description: >
          The organization ensures system processing is complete, valid,
          accurate, timely, and authorized. (Paraphrase)
        depth: 1
        assessable: true
        category: Processing Integrity

      # ─── P1 — Privacy ──────────────────────────────────────────────

      - urn: urn:inflect:req:soc2-2017:p1
        ref_id: P1
        name: Privacy
        description: >
          The organization manages personal information in conformity
          with its privacy commitments and criteria. (Paraphrase)
        depth: 1
        assessable: true
        category: Privacy
