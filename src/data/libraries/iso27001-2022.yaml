# ISO/IEC 27001:2022 — Framework Library
# Paraphrased requirement descriptions — NOT verbatim ISO text.
# This is a structural outline for compliance tracking purposes.

urn: urn:inflect:library:iso27001-2022
locale: en
ref_id: ISO27001-2022
name: ISO/IEC 27001:2022
description: >
  Information security, cybersecurity and privacy protection — Information
  security management systems — Requirements. This library covers the ISMS
  management clauses (4-10) and Annex A controls.
copyright: >
  This is a structural outline of ISO 27001:2022. The full standard can
  be purchased from https://www.iso.org/standard/27001
version: 2
publication_date: "2022-10-25"
provider: ISO/IEC
packager: inflect
kind: ISO_STANDARD

objects:
  framework:
    urn: urn:inflect:framework:iso27001-2022
    ref_id: ISO27001-2022
    name: ISO/IEC 27001:2022
    description: Information Security Management System Requirements and Annex A Controls

    requirement_nodes:
      # ─── ISMS Management Clauses (4-10) ──────────────────────────────

      - urn: urn:inflect:req:iso27001-2022:clause-4
        ref_id: "4"
        name: Context of the Organization
        description: >
          Understand your organization's environment: identify external and internal
          factors, stakeholder expectations, and define ISMS boundaries. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Context analysis document, Interested parties register, ISMS scope statement"
        checklist:
          - Identify external issues (regulatory, market, technology trends)
          - Identify internal issues (culture, structure, capabilities)
          - List interested parties and their requirements
          - Define ISMS scope boundaries
          - Document scope exclusions with justification
          - Establish the ISMS scope statement

      - urn: urn:inflect:req:iso27001-2022:clause-5
        ref_id: "5"
        name: Leadership
        description: >
          Top management must demonstrate commitment by establishing policy, defining
          roles and responsibilities, and ensuring adequate resources. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Information security policy, Roles & responsibilities matrix, Management commitment evidence"
        checklist:
          - Draft and approve information security policy
          - Assign ISMS roles and responsibilities
          - Ensure top management commitment is documented
          - Communicate the policy across the organization
          - Integrate ISMS requirements into business processes

      - urn: urn:inflect:req:iso27001-2022:clause-6
        ref_id: "6"
        name: Planning
        description: >
          Address risks and opportunities, set measurable security objectives, and
          plan changes to the ISMS in a controlled manner. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Risk assessment methodology, Risk register, Risk treatment plan, Security objectives document"
        checklist:
          - Define risk assessment methodology
          - Identify information security risks
          - Analyze and evaluate risks
          - Define risk treatment options
          - Create risk treatment plan
          - Set measurable security objectives
          - Plan for achieving objectives

      - urn: urn:inflect:req:iso27001-2022:clause-7
        ref_id: "7"
        name: Support
        description: >
          Ensure the ISMS has resources, competencies, awareness, communication
          channels, and documented information. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Competency matrix, Training records, Communication plan, Document control procedure"
        checklist:
          - Determine and provide necessary resources
          - Define competency requirements for ISMS roles
          - Conduct security awareness training
          - Establish internal and external communication processes
          - Define documented information requirements
          - Implement document control procedures

      - urn: urn:inflect:req:iso27001-2022:clause-8
        ref_id: "8"
        name: Operation
        description: >
          Execute plans and processes: perform risk assessments, implement risk
          treatment plans, and manage operational controls. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Operational procedures, Risk assessment results, Risk treatment implementation records"
        checklist:
          - Implement operational planning and control processes
          - Perform risk assessments at planned intervals
          - Implement risk treatment plan
          - Control outsourced processes
          - Retain documented results of risk assessments
          - Manage changes that affect the ISMS

      - urn: urn:inflect:req:iso27001-2022:clause-9
        ref_id: "9"
        name: Performance Evaluation
        description: >
          Monitor, measure, analyze and evaluate ISMS performance. Conduct
          internal audits and management reviews. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Monitoring & measurement procedures, Internal audit program, Management review minutes"
        checklist:
          - Define what needs to be monitored and measured
          - Determine monitoring and measurement methods
          - Plan and conduct internal audits
          - Report audit results to management
          - Conduct management reviews at planned intervals
          - Document management review outputs and decisions

      - urn: urn:inflect:req:iso27001-2022:clause-10
        ref_id: "10"
        name: Improvement
        description: >
          React to nonconformities with corrective actions and continually
          improve ISMS effectiveness. (Paraphrase)
        depth: 1
        assessable: false
        category: Management
        artifacts: "Nonconformity register, Corrective action records, Continual improvement log"
        checklist:
          - Establish a process for nonconformity and corrective action
          - Investigate root causes of nonconformities
          - Implement corrective actions
          - Review effectiveness of corrective actions
          - Identify opportunities for continual improvement
          - Document improvement actions and outcomes

