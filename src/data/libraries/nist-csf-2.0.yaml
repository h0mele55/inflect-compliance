# NIST Cybersecurity Framework (CSF) v2.0 — Framework Library
# Based on the public NIST CSF 2.0 structure.
# Descriptions paraphrased from the publicly available NIST documentation.

urn: urn:inflect:library:nist-csf-2.0
locale: en
ref_id: NIST-CSF-2.0
name: NIST Cybersecurity Framework v2.0
description: >
  The NIST Cybersecurity Framework (CSF) 2.0 provides a taxonomy of high-level
  cybersecurity outcomes that can be used by any organization to better understand,
  assess, prioritize, and communicate its cybersecurity efforts.
copyright: >
  Information presented on NIST sites is considered public information
  and may be distributed or copied.
version: 1
publication_date: "2024-02-26"
provider: NIST
packager: inflect
kind: NIST_FRAMEWORK

objects:
  framework:
    urn: urn:inflect:framework:nist-csf-2.0
    ref_id: NIST-CSF-2.0
    name: NIST CSF v2.0
    description: NIST Cybersecurity Framework version 2.0
    min_score: 1
    max_score: 4
    scores_definition:
      - score: 1
        name: Partial
        description: >
          Cybersecurity risk management is ad hoc with limited awareness
          at the organizational level.
      - score: 2
        name: Risk Informed
        description: >
          Risk management practices exist but may not be established
          as organization-wide policy.
      - score: 3
        name: Repeatable
        description: >
          Risk management practices are formally approved and expressed
          as policy, regularly updated based on risk processes.
      - score: 4
        name: Adaptive
        description: >
          Organization adapts its practices based on lessons learned
          and predictive indicators.

    requirement_nodes:
      # ─── GOVERN (GV) ────────────────────────────────────────────────

      - urn: urn:inflect:req:nist-csf-2.0:gv
        ref_id: GV
        name: GOVERN
        description: >
          The organization's cybersecurity risk management strategy, expectations,
          and policy are established, communicated, and monitored.
        depth: 1
        assessable: false
        category: Governance

      - urn: urn:inflect:req:nist-csf-2.0:gv.oc
        ref_id: GV.OC
        name: Organizational Context
        description: >
          The circumstances surrounding the organization's cybersecurity risk
          management decisions are understood.
        parent_urn: urn:inflect:req:nist-csf-2.0:gv
        depth: 2
        assessable: false
        category: Governance

      - urn: urn:inflect:req:nist-csf-2.0:gv.oc-01
        ref_id: GV.OC-01
        description: >
          The organizational mission is understood and informs cybersecurity
          risk management.
        parent_urn: urn:inflect:req:nist-csf-2.0:gv.oc
        depth: 3
        assessable: true
        category: Governance

      - urn: urn:inflect:req:nist-csf-2.0:gv.oc-02
        ref_id: GV.OC-02
        description: >
          Internal and external stakeholders are understood, and their needs
          regarding cybersecurity risk management are considered.
        parent_urn: urn:inflect:req:nist-csf-2.0:gv.oc
        depth: 3
        assessable: true
        category: Governance

      - urn: urn:inflect:req:nist-csf-2.0:gv.rm
        ref_id: GV.RM
        name: Risk Management Strategy
        description: >
          The organization's priorities, constraints, and risk tolerance
          are established and used to support operational risk decisions.
        parent_urn: urn:inflect:req:nist-csf-2.0:gv
        depth: 2
        assessable: false
        category: Governance

      - urn: urn:inflect:req:nist-csf-2.0:gv.rm-01
        ref_id: GV.RM-01
        description: >
          Risk management objectives are established and agreed to by
          organizational stakeholders.
        parent_urn: urn:inflect:req:nist-csf-2.0:gv.rm
        depth: 3
        assessable: true
        category: Governance

      # ─── IDENTIFY (ID) ──────────────────────────────────────────────

      - urn: urn:inflect:req:nist-csf-2.0:id
        ref_id: ID
        name: IDENTIFY
        description: >
          The organization's current cybersecurity risks are understood.
        depth: 1
        assessable: false
        category: Identify

      - urn: urn:inflect:req:nist-csf-2.0:id.am
        ref_id: ID.AM
        name: Asset Management
        description: >
          Assets that enable the organization to achieve business purposes
          are identified and managed.
        parent_urn: urn:inflect:req:nist-csf-2.0:id
        depth: 2
        assessable: false
        category: Identify

      - urn: urn:inflect:req:nist-csf-2.0:id.am-01
        ref_id: ID.AM-01
        description: >
          Inventories of hardware managed by the organization are maintained.
        parent_urn: urn:inflect:req:nist-csf-2.0:id.am
        depth: 3
        assessable: true
        category: Identify

      - urn: urn:inflect:req:nist-csf-2.0:id.am-02
        ref_id: ID.AM-02
        description: >
          Inventories of software, services, and systems managed by the
          organization are maintained.
        parent_urn: urn:inflect:req:nist-csf-2.0:id.am
        depth: 3
        assessable: true
        category: Identify

      - urn: urn:inflect:req:nist-csf-2.0:id.ra
        ref_id: ID.RA
        name: Risk Assessment
        description: >
          The cybersecurity risk to the organization, assets, and individuals
          is understood.
        parent_urn: urn:inflect:req:nist-csf-2.0:id
        depth: 2
        assessable: false
        category: Identify

      - urn: urn:inflect:req:nist-csf-2.0:id.ra-01
        ref_id: ID.RA-01
        description: >
          Vulnerabilities in assets are identified, validated, and recorded.
        parent_urn: urn:inflect:req:nist-csf-2.0:id.ra
        depth: 3
        assessable: true
        category: Identify

      # ─── PROTECT (PR) ───────────────────────────────────────────────

      - urn: urn:inflect:req:nist-csf-2.0:pr
        ref_id: PR
        name: PROTECT
        description: >
          Safeguards to manage the organization's cybersecurity risks are used.
        depth: 1
        assessable: false
        category: Protect

      - urn: urn:inflect:req:nist-csf-2.0:pr.aa
        ref_id: PR.AA
        name: Identity Management, Authentication and Access Control
        description: >
          Access to assets is limited to authorized users, services, and hardware
          and is managed commensurate with the assessed risk.
        parent_urn: urn:inflect:req:nist-csf-2.0:pr
        depth: 2
        assessable: false
        category: Protect

      - urn: urn:inflect:req:nist-csf-2.0:pr.aa-01
        ref_id: PR.AA-01
        description: >
          Identities and credentials for authorized users, services, and
          hardware are managed by the organization.
        parent_urn: urn:inflect:req:nist-csf-2.0:pr.aa
        depth: 3
        assessable: true
        category: Protect

      - urn: urn:inflect:req:nist-csf-2.0:pr.ds
        ref_id: PR.DS
        name: Data Security
        description: >
          Data are managed consistent with the organization's risk strategy to
          protect confidentiality, integrity, and availability.
        parent_urn: urn:inflect:req:nist-csf-2.0:pr
        depth: 2
        assessable: false
        category: Protect

      - urn: urn:inflect:req:nist-csf-2.0:pr.ds-01
        ref_id: PR.DS-01
        description: >
          The confidentiality, integrity, and availability of data-at-rest
          are protected.
        parent_urn: urn:inflect:req:nist-csf-2.0:pr.ds
        depth: 3
        assessable: true
        category: Protect

      # ─── DETECT (DE) ────────────────────────────────────────────────

      - urn: urn:inflect:req:nist-csf-2.0:de
        ref_id: DE
        name: DETECT
        description: >
          Possible cybersecurity attacks and compromises are found and analyzed.
        depth: 1
        assessable: false
        category: Detect

      - urn: urn:inflect:req:nist-csf-2.0:de.cm
        ref_id: DE.CM
        name: Continuous Monitoring
        description: >
          Assets are monitored to find anomalies, indicators of compromise,
          and other potentially adverse events.
        parent_urn: urn:inflect:req:nist-csf-2.0:de
        depth: 2
        assessable: false
        category: Detect

      - urn: urn:inflect:req:nist-csf-2.0:de.cm-01
        ref_id: DE.CM-01
        description: >
          Networks and network services are monitored to find potentially
          adverse events.
        parent_urn: urn:inflect:req:nist-csf-2.0:de.cm
        depth: 3
        assessable: true
        category: Detect

      # ─── RESPOND (RS) ───────────────────────────────────────────────

      - urn: urn:inflect:req:nist-csf-2.0:rs
        ref_id: RS
        name: RESPOND
        description: >
          Actions regarding a detected cybersecurity incident are taken.
        depth: 1
        assessable: false
        category: Respond

      - urn: urn:inflect:req:nist-csf-2.0:rs.ma
        ref_id: RS.MA
        name: Incident Management
        description: >
          Responses to detected cybersecurity incidents are managed.
        parent_urn: urn:inflect:req:nist-csf-2.0:rs
        depth: 2
        assessable: false
        category: Respond

      - urn: urn:inflect:req:nist-csf-2.0:rs.ma-01
        ref_id: RS.MA-01
        description: >
          The incident response plan is executed in coordination with
          relevant third parties once an incident is declared.
        parent_urn: urn:inflect:req:nist-csf-2.0:rs.ma
        depth: 3
        assessable: true
        category: Respond

      # ─── RECOVER (RC) ───────────────────────────────────────────────

      - urn: urn:inflect:req:nist-csf-2.0:rc
        ref_id: RC
        name: RECOVER
        description: >
          Assets and operations affected by a cybersecurity incident are restored.
        depth: 1
        assessable: false
        category: Recover

      - urn: urn:inflect:req:nist-csf-2.0:rc.rp
        ref_id: RC.RP
        name: Incident Recovery Plan Execution
        description: >
          Restoration activities are performed to ensure operational
          availability of affected systems and services.
        parent_urn: urn:inflect:req:nist-csf-2.0:rc
        depth: 2
        assessable: false
        category: Recover

      - urn: urn:inflect:req:nist-csf-2.0:rc.rp-01
        ref_id: RC.RP-01
        description: >
          The recovery portion of the incident response plan is executed
          once initiated from the incident response process.
        parent_urn: urn:inflect:req:nist-csf-2.0:rc.rp
        depth: 3
        assessable: true
        category: Recover
