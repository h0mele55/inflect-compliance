# NIS2 Directive — Framework Library
# Paraphrased requirement descriptions — NOT verbatim EU directive text.
# This is a structural outline for compliance tracking purposes.
#
# Reference: Directive (EU) 2022/2555 (NIS2)
# Primarily Article 21 (Cybersecurity risk-management measures)
# and Article 23 (Reporting obligations)

urn: urn:inflect:library:nis2-2022
locale: en
ref_id: NIS2-2022
name: NIS2 Directive (EU 2022/2555)
description: >
  Directive on measures for a high common level of cybersecurity across the
  Union. This library covers the cybersecurity risk-management measures
  (Article 21) and reporting obligations (Article 23) applicable to essential
  and important entities.
copyright: >
  This is a structural outline of the NIS2 Directive. The full directive text
  is published in the Official Journal of the European Union.
version: 1
publication_date: "2022-12-27"
provider: European Union
packager: inflect
kind: EU_DIRECTIVE

objects:
  framework:
    urn: urn:inflect:framework:nis2-2022
    ref_id: NIS2-2022
    name: NIS2 Directive
    description: >
      Cybersecurity risk-management measures and reporting obligations for
      essential and important entities under Directive (EU) 2022/2555.

    requirement_nodes:

      # ─── Article 21 — Cybersecurity Risk-Management Measures ──────────

      - urn: urn:inflect:req:nis2-2022:art21
        ref_id: Art21
        name: "Article 21 — Cybersecurity Risk-Management Measures"
        description: >
          Member States shall ensure that essential and important entities take
          appropriate and proportionate technical, operational, and organisational
          measures to manage cybersecurity risks posed to network and information
          systems. (Paraphrase)
        depth: 1
        assessable: false
        category: Risk Management

      - urn: urn:inflect:req:nis2-2022:nis2-rm
        ref_id: NIS2-RM
        name: Risk Management Measures
        description: >
          Entities must take appropriate technical, operational, and organizational
          measures to manage cybersecurity risks to network and information systems.
          This includes policies on risk analysis and information system security.
          (Paraphrase — Art. 21(2)(a))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Risk Management
        artifacts: "Risk assessment methodology, Risk register, Risk treatment plan, Cybersecurity policy"
        checklist:
          - Define and document risk assessment methodology
          - Identify and classify information systems and assets
          - Perform periodic risk assessments
          - Establish risk treatment plans with priorities
          - Document and communicate risk management policies
          - Review and update risk management measures regularly

      - urn: urn:inflect:req:nis2-2022:nis2-ir
        ref_id: NIS2-IR
        name: Incident Handling
        description: >
          Establish processes to prevent, detect, and respond to cybersecurity
          incidents, including clear escalation and notification procedures.
          (Paraphrase — Art. 21(2)(b))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Incident Response
        artifacts: "Incident response plan, Incident classification matrix, Post-incident review reports"
        checklist:
          - Create and maintain an incident response plan
          - Define incident classification and severity levels
          - Establish incident detection mechanisms
          - Define escalation procedures and responsible roles
          - Conduct post-incident reviews and lessons-learned
          - Train incident response team regularly

      - urn: urn:inflect:req:nis2-2022:nis2-bc
        ref_id: NIS2-BC
        name: Business Continuity
        description: >
          Ensure continuity of essential services including backup management,
          disaster recovery, and crisis management.
          (Paraphrase — Art. 21(2)(c))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Business Continuity
        artifacts: "Business continuity plan, Disaster recovery plan, Backup policy, Crisis management procedure"
        checklist:
          - Develop and maintain a business continuity plan
          - Implement backup management procedures
          - Define and test disaster recovery procedures
          - Establish crisis management roles and communication plans
          - Conduct periodic business continuity exercises
          - Review and update continuity plans based on exercises

      - urn: urn:inflect:req:nis2-2022:nis2-sc
        ref_id: NIS2-SC
        name: Supply Chain Security
        description: >
          Address security aspects of relationships with direct suppliers and
          service providers, including supply chain risk assessments.
          (Paraphrase — Art. 21(2)(d))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Supply Chain
        artifacts: "Supplier security policy, Vendor risk assessment register, Third-party audit reports"
        checklist:
          - Establish a supplier security assessment process
          - Evaluate security measures of direct suppliers
          - Include security requirements in supplier contracts
          - Monitor and periodically review supplier security posture
          - Maintain a register of critical suppliers and dependencies
          - Assess supply chain risks specific to each supplier

      - urn: urn:inflect:req:nis2-2022:nis2-sd
        ref_id: NIS2-SD
        name: Secure Development
        description: >
          Apply security in the acquisition, development, and maintenance of
          network and information systems, including vulnerability handling
          and disclosure. (Paraphrase — Art. 21(2)(e))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Development
        artifacts: "Secure development lifecycle policy, Vulnerability management procedure, Vulnerability disclosure process"
        checklist:
          - Define and enforce a secure development lifecycle (SDLC)
          - Integrate security testing into CI/CD pipelines
          - Establish vulnerability handling and disclosure procedures
          - Conduct regular vulnerability scans and penetration tests
          - Patch known vulnerabilities within defined SLAs
          - Secure acquisition processes for third-party software

      - urn: urn:inflect:req:nis2-2022:nis2-as
        ref_id: NIS2-AS
        name: Security Assessment
        description: >
          Implement policies and procedures to assess the effectiveness of
          cybersecurity risk management measures.
          (Paraphrase — Art. 21(2)(f))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Assessment
        artifacts: "Security assessment policy, Audit reports, Effectiveness metrics dashboard"
        checklist:
          - Define policies for regular cybersecurity assessments
          - Conduct periodic internal audits of security controls
          - Establish metrics to measure control effectiveness
          - Commission external assessments where appropriate
          - Track remediation of assessment findings
          - Report assessment results to management

      - urn: urn:inflect:req:nis2-2022:nis2-ch
        ref_id: NIS2-CH
        name: Cyber Hygiene & Training
        description: >
          Establish basic cyber hygiene practices and security awareness
          training for all personnel.
          (Paraphrase — Art. 21(2)(g))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Training
        artifacts: "Cyber hygiene policy, Security awareness training materials, Training attendance records"
        checklist:
          - Define baseline cyber hygiene practices for all personnel
          - Develop security awareness training programme
          - Deliver training at onboarding and periodically thereafter
          - Track training completion and attendance
          - Conduct phishing simulations and social engineering exercises
          - Review and update training content regularly

      - urn: urn:inflect:req:nis2-2022:nis2-cr
        ref_id: NIS2-CR
        name: Cryptography
        description: >
          Apply policies and procedures for the use of cryptography and, where
          appropriate, encryption to protect information.
          (Paraphrase — Art. 21(2)(h))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Cryptography
        artifacts: "Cryptography policy, Encryption standards document, Key management procedure"
        checklist:
          - Define a cryptography and encryption policy
          - Identify data requiring encryption (at rest, in transit)
          - Implement approved cryptographic algorithms and key lengths
          - Establish key management procedures (generation, storage, rotation)
          - Monitor for deprecated or weak cryptographic methods
          - Document and review cryptographic controls periodically

      - urn: urn:inflect:req:nis2-2022:nis2-hr
        ref_id: NIS2-HR
        name: Human Resources Security
        description: >
          Apply appropriate security measures for human resources including
          access control policies and asset management.
          (Paraphrase — Art. 21(2)(i))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: HR Security
        artifacts: "HR security policy, Access control matrix, Asset management register"
        checklist:
          - Conduct background checks for security-sensitive roles
          - Define security responsibilities in job descriptions
          - Implement access provisioning and de-provisioning processes
          - Maintain an asset management register
          - Apply the principle of least privilege for access rights
          - Ensure secure offboarding of personnel

      - urn: urn:inflect:req:nis2-2022:nis2-am
        ref_id: NIS2-AM
        name: Authentication & Access Management
        description: >
          Use multi-factor authentication, secure communication, and identity
          management solutions as appropriate.
          (Paraphrase — Art. 21(2)(j))
        parent_urn: urn:inflect:req:nis2-2022:art21
        depth: 2
        assessable: true
        category: Access Management
        artifacts: "MFA policy, Identity management procedure, Privileged access management policy"
        checklist:
          - Deploy multi-factor authentication for critical systems
          - Implement centralized identity and access management
          - Define and enforce privileged access management controls
          - Use secure communication channels (encrypted email, VPN)
          - Monitor and log authentication events
          - Review access rights periodically

      # ─── Article 23 — Reporting Obligations ───────────────────────────

      - urn: urn:inflect:req:nis2-2022:art23
        ref_id: Art23
        name: "Article 23 — Reporting Obligations"
        description: >
          Significant incidents must be reported to the relevant national CSIRT or
          competent authority. (Paraphrase)
        depth: 1
        assessable: false
        category: Reporting

      - urn: urn:inflect:req:nis2-2022:nis2-re
        ref_id: NIS2-RE
        name: Reporting & Notification
        description: >
          Report significant incidents to the relevant authority promptly:
          early warning within 24 hours, full notification within 72 hours,
          and a final report within one month.
          (Paraphrase — Art. 23(1)-(4))
        parent_urn: urn:inflect:req:nis2-2022:art23
        depth: 2
        assessable: true
        category: Reporting
        artifacts: "Incident notification procedure, Reporting templates (24h/72h/final), Authority contact register"
        checklist:
          - Define significant incident classification criteria
          - Establish an early-warning notification process (within 24 hours)
          - Establish a full incident notification process (within 72 hours)
          - Prepare a final report procedure (within one month)
          - Maintain contact details for the relevant CSIRT / authority
          - Train staff on reporting obligations and timelines

      # ─── Governance & Accountability ──────────────────────────────────

      - urn: urn:inflect:req:nis2-2022:governance
        ref_id: Governance
        name: Governance & Accountability
        description: >
          Overarching governance obligations under NIS2, including management
          body oversight and accountability. (Paraphrase)
        depth: 1
        assessable: false
        category: Governance

      - urn: urn:inflect:req:nis2-2022:nis2-gov
        ref_id: NIS2-GOV
        name: Governance & Accountability
        description: >
          Management bodies must approve cybersecurity risk-management measures,
          oversee their implementation, and can be held liable for infringements.
          Management members must undergo cybersecurity training.
          (Paraphrase — Art. 20)
        parent_urn: urn:inflect:req:nis2-2022:governance
        depth: 2
        assessable: true
        category: Governance
        artifacts: "Board cybersecurity resolution, Management oversight log, Management training records"
        checklist:
          - Obtain management body approval for cybersecurity measures
          - Define management oversight and review cadence
          - Document management body accountability for cybersecurity
          - Ensure management members undergo cybersecurity training
          - Establish mechanisms for management to oversee implementation
          - Document liability awareness and governance roles
