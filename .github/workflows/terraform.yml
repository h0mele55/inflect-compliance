# ───────────────────────────────────────────────────────────────
#  Terraform — infrastructure delivery pipeline
#
#  Triggers:
#    1. pull_request   — fmt + validate + plan(staging) + plan(production);
#                        plan output posted as sticky PR comment per env.
#                        Skipped for fork PRs (OIDC requires same-repo).
#    2. push to main   — fmt + validate + apply(staging, auto) →
#                        apply(production, gated by env approval).
#    3. workflow_dispatch — operator-triggered apply of one env.
#
#  Auth: OIDC. Each GitHub Environment supplies AWS_ROLE_TO_ASSUME
#  pointing at an IAM role whose trust policy allows assume-from-OIDC
#  for this repository. NO long-lived AWS keys live in the workflow.
#
#  Required GitHub Environments (configure in Settings → Environments):
#    staging:    no protection rules required.
#    production: required reviewers (≥ 1) — this IS the manual-approval
#                gate the OI-1 spec calls for.
#
#  Each environment must hold one secret:
#    AWS_ROLE_TO_ASSUME — ARN of the per-env IAM role.
#
#  Complementary to .github/workflows/deploy.yml:
#    terraform.yml → provisions infrastructure (RDS, ElastiCache, S3, VPC, ...)
#    deploy.yml    → ships the app Docker image onto provisioned compute
# ───────────────────────────────────────────────────────────────
name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  TF_VERSION: "1.9.5"
  TF_WORKING_DIR: "infra/terraform"
  AWS_REGION: "us-east-1"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  1. Lint — fmt + validate. No backend, no AWS creds.
  # ═══════════════════════════════════════════════════════════════
  fmt-validate:
    name: "Lint: fmt + validate"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  # ═══════════════════════════════════════════════════════════════
  #  2. Plan — runs on PR for both envs in parallel. Plan output
  #     is posted as a sticky PR comment (one per env) and to the
  #     workflow run summary. Skipped for fork PRs (OIDC won't work).
  # ═══════════════════════════════════════════════════════════════
  plan:
    name: "Plan: ${{ matrix.environment }}"
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    needs: [fmt-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        environment:
          - staging
          - production
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-tf-plan-${{ matrix.environment }}-${{ github.run_id }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -reconfigure \
            -backend-config=environments/${{ matrix.environment }}/backend.hcl

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        # Capture exit code so we can comment on PRs even when the plan
        # itself surfaces a diff that fails (-detailed-exitcode = 2).
        # 0 = no changes, 1 = error, 2 = changes pending.
        run: |
          set +e
          terraform plan \
            -input=false \
            -lock-timeout=300s \
            -var-file=environments/${{ matrix.environment }}/terraform.tfvars \
            -out=tfplan \
            -no-color \
            -detailed-exitcode \
            > plan.stdout 2>&1
          ec=$?
          terraform show -no-color tfplan > plan.txt 2>&1 || true
          echo "exitcode=$ec" >> $GITHUB_OUTPUT
          cat plan.stdout
          # GitHub PR comment body limit is ~65KB; truncate at 60KB.
          if [ -f plan.txt ]; then
            head -c 60000 plan.txt > plan.truncated.txt
            if [ "$(wc -c < plan.txt)" -gt 60000 ]; then
              printf '\n\n...(truncated; see workflow logs for full plan)\n' >> plan.truncated.txt
            fi
          else
            echo '(plan failed before show; see workflow logs)' > plan.truncated.txt
          fi
          # Treat exitcode 0 (no changes) and 2 (changes) as success;
          # only 1 is a real failure.
          if [ "$ec" = "1" ]; then exit 1; fi
          exit 0

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_DIR: ${{ env.TF_WORKING_DIR }}
          ENV_NAME: ${{ matrix.environment }}
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const env = process.env.ENV_NAME;
            const marker = `<!-- terraform-plan:${env} -->`;
            const exitcode = process.env.PLAN_EXITCODE || '?';
            const status =
              exitcode === '0' ? '✅ No changes' :
              exitcode === '2' ? '🟡 Changes pending' :
              '❌ Plan failed';

            let plan = '(plan output unavailable)';
            try {
              plan = fs.readFileSync(`${process.env.PLAN_DIR}/plan.truncated.txt`, 'utf8');
            } catch (e) {
              plan = `(could not read plan output: ${e.message})`;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              `### Terraform Plan — \`${env}\``,
              ``,
              `**Status:** ${status}`,
              `**Workflow run:** ${runUrl}`,
              ``,
              `<details><summary>Plan output</summary>`,
              ``,
              '```hcl',
              plan,
              '```',
              ``,
              `</details>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = comments.find((c) => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Workflow run summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          {
            echo "## Plan: ${{ matrix.environment }}"
            echo ""
            echo "Exit code: ${{ steps.plan.outputs.exitcode }}"
            echo ""
            echo '```hcl'
            head -c 500000 plan.txt 2>/dev/null || echo "(plan unavailable)"
            echo ''
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  3. Apply: staging — auto on push to main, or via dispatch.
  #     No environment-protection rules → runs without human gate.
  # ═══════════════════════════════════════════════════════════════
  apply-staging:
    name: "Apply: staging"
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    needs: [fmt-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    concurrency:
      group: terraform-staging
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-tf-apply-staging-${{ github.run_id }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -reconfigure -backend-config=environments/staging/backend.hcl

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -lock-timeout=300s \
            -var-file=environments/staging/terraform.tfvars

      - name: Apply summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          {
            echo "## Apply: staging"
            echo ""
            echo "Outputs:"
            echo '```'
            terraform output 2>/dev/null || echo "(no outputs)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  4. Apply: production — gated by the production GitHub
  #     Environment's required-reviewers protection rule. The
  #     workflow run pauses at this job until a reviewer approves.
  #
  #     On push: only runs if apply-staging succeeded (canary path).
  #     On workflow_dispatch=production: runs without staging
  #     dependency (escape hatch for prod-only changes).
  # ═══════════════════════════════════════════════════════════════
  apply-production:
    name: "Apply: production"
    needs: [fmt-validate, apply-staging]
    if: |
      always() &&
      needs.fmt-validate.result == 'success' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.apply-staging.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    concurrency:
      group: terraform-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-tf-apply-production-${{ github.run_id }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -reconfigure -backend-config=environments/production/backend.hcl

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -lock-timeout=600s \
            -var-file=environments/production/terraform.tfvars

      - name: Apply summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          {
            echo "## Apply: production"
            echo ""
            echo "Outputs:"
            echo '```'
            terraform output 2>/dev/null || echo "(no outputs)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
