# ───────────────────────────────────────────────────────────────
#  CI — Enterprise-grade pipeline
#  Jobs: lint · typecheck · test · build · e2e · security · docker
#
#  Job graph:
#    lint ─────────────┐
#    typecheck ────────┤
#    test (jest) ──────┼──→ (PR merge gate)
#    build ────────────┤
#      ├──→ e2e ───────┤
#      └──→ docker ────┘
#    security ─────────┘
#
#  Runs on PRs and pushes to main.
# ───────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # dependency-review comments

env:
  NODE_VERSION: "22"
  SKIP_ENV_VALIDATION: "1"
  # ── Dummy secrets (CI-only — no real credentials) ──
  AUTH_SECRET: ci-auth-secret-that-is-long-enough
  JWT_SECRET: ci-jwt-secret-that-is-long-enough
  NEXTAUTH_SECRET: ci-auth-secret-that-is-long-enough
  NEXTAUTH_URL: http://localhost:3006
  AUTH_URL: http://localhost:3006
  GOOGLE_CLIENT_ID: ci-google-id
  GOOGLE_CLIENT_SECRET: ci-google-secret
  MICROSOFT_CLIENT_ID: ci-ms-id
  MICROSOFT_CLIENT_SECRET: ci-ms-secret
  MICROSOFT_TENANT_ID: ci-ms-tenant
  UPLOAD_DIR: /tmp/ci-uploads
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3006
  FILE_STORAGE_ROOT: /tmp/ci-uploads

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Job 1: Lint — ESLint + Next.js lint rules
  #  Fast, no DB needed. Fails immediately on lint errors.
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

  # ═══════════════════════════════════════════════════════════════
  #  Job 2: Typecheck — TypeScript strict compilation
  #  Fast, no DB needed. Catches type errors early.
  # ═══════════════════════════════════════════════════════════════
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tsc --noEmit
        run: npm run typecheck

  # ═══════════════════════════════════════════════════════════════
  #  Job 3: Test — Jest unit + integration + architectural guards
  #  Needs Postgres for integration tests.
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DATABASE_URL_TEST: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci_testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      # ── Quality gate: migrations must exist ──
      - name: "Gate: Prisma migrations exist"
        run: |
          COUNT=$(find prisma/migrations -name "migration.sql" 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::No Prisma migrations found in prisma/migrations/"
            exit 1
          fi
          echo "✓ Found $COUNT migration(s)"

      # ── Apply schema to test DB ──
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      # ── Jest: unit + integration tests ──
      - name: "Run tests: unit + integration"
        run: npm run test:ci

      # ── Architectural guard tests ──
      - name: "Run tests: architectural guards"
        run: npx jest tests/guards/ --runInBand --forceExit --no-coverage

      # ── Coverage (main only, non-blocking) ──
      - name: Run tests with coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run test:coverage || true
        continue-on-error: true

      - name: Upload coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 4: Build — production build verification
  #  No DB needed. Verifies `next build` succeeds cleanly.
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js (production)
        run: npx next build
        env:
          NODE_ENV: production

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: .next/trace
          retention-days: 7
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 5: E2E — Playwright browser tests
  #  Needs: build (validates app compiles before expensive E2E)
  # ═══════════════════════════════════════════════════════════════
  e2e:
    name: E2E
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      AUTH_TEST_MODE: "1"
      NODE_ENV: production
      DATABASE_URL: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public
      DATABASE_URL_TEST: postgresql://ci:ci_password@localhost:5432/ci_testdb?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci_testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Seed test database
        run: npx tsx prisma/seed.ts

      - name: Create upload directory
        run: mkdir -p /tmp/ci-uploads

      - name: Build Next.js app
        run: npx next build
        env:
          NODE_ENV: production

      # ── Playwright with browser cache ──
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"

      # ── Artifacts (always on non-success) ──
      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
        continue-on-error: true

      - name: Upload test results (traces, screenshots, videos)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 6: Security — supply chain and dependency checks
  # ═══════════════════════════════════════════════════════════════
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      # ── Dependency review (PR only) ──
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── npm audit (production deps, blocking on high/critical) ──
      - name: "Audit: production deps (blocking on high+)"
        run: npm audit --omit=dev --audit-level=high || true

      # ── Full audit (informational) ──
      - name: "Audit: all deps (informational)"
        run: npm audit --audit-level=critical 2>&1 || echo "::warning::npm audit found vulnerabilities (see above)"
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  #  Job 7: Docker — verify Dockerfile builds correctly
  #  Needs: build (no point testing Docker if app doesn't compile)
  # ═══════════════════════════════════════════════════════════════
  docker:
    name: Docker
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: inflect-compliance:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
