# ───────────────────────────────────────────────────────────────
#  Deploy — automated staging + manual production
#  Triggers: push to main (staging), manual dispatch (production)
#
#  REQUIRED GITHUB CONFIGURATION:
#  - Environment "staging" with secrets: DEPLOY_HOST, DEPLOY_USER,
#    DEPLOY_SSH_KEY, DEPLOY_PATH and optional variable: STAGING_URL
#  - Environment "production" with secrets: DEPLOY_HOST, DEPLOY_USER,
#    DEPLOY_SSH_KEY, DEPLOY_PATH and optional variable: PRODUCTION_URL
# ───────────────────────────────────────────────────────────────
name: Deploy

on:
  # Auto-deploy staging when CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  # Manual production deploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      ref:
        description: "Git ref to deploy (branch, tag, SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false  # Never cancel in-progress deploys

permissions:
  contents: read
  packages: write  # GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Gate — only deploy if CI succeeded
  # ═══════════════════════════════════════════════════════════════
  gate:
    name: "Gate: CI Status"
    runs-on: ubuntu-latest
    # Skip if workflow_run failed (auto-deploy scenario)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed — proceeding with deploy"

  # ═══════════════════════════════════════════════════════════════
  #  Build & Push — container image to GHCR
  # ═══════════════════════════════════════════════════════════════
  build-image:
    name: "Build & Push Image"
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  #  Deploy Staging — auto on main, manual via dispatch
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: "Deploy: Staging"
    needs: [build-image]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.example.com
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${APP_PATH:-/opt/inflect-compliance}"
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # Tag as staging-current for compose
            docker tag \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              inflect-compliance:staging-current
            
            # Deploy with compose
            docker compose -f docker-compose.staging.yml up -d --no-build
            
            # Wait for health check
            echo "Waiting for app health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/auth/session > /dev/null 2>&1; then
                echo "✓ Staging is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "::error::Staging health check failed after 60s"
            exit 1

  # ═══════════════════════════════════════════════════════════════
  #  Deploy Production — manual only, requires approval
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    name: "Deploy: Production"
    needs: [build-image]
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://app.example.com
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        env:
          APP_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${APP_PATH:-/opt/inflect-compliance}"
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # Tag as prod-current for compose
            docker tag \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              inflect-compliance:prod-current
            
            # Deploy with compose
            docker compose -f docker-compose.prod.yml up -d --no-build
            
            # Wait for health check
            echo "Waiting for app health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✓ Production is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "::error::Production health check failed after 60s"
            exit 1
